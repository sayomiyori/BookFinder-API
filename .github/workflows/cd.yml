name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Docker image to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/bookfinder-api:latest
            ghcr.io/${{ github.repository_owner }}/bookfinder-api:${{ github.sha }}

  # Railway автоматически деплоит при пуше в main через GitHub-интеграцию.
  # Настройка: Railway Dashboard → Project → Settings → Source → Connect GitHub repo.
  # railway.toml в корне репозитория управляет параметрами сборки и деплоя.
