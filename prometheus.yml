global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: bookfinder
    static_configs:
      - targets:
          - host.docker.internal:8001  # Mac/Windows (host port из docker-compose.yml)
          # - 172.17.0.1:8001          # Linux — раскомментировать если нужно
    metrics_path: /metrics
