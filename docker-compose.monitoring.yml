# BookFinder API — мониторинг (Prometheus + Grafana)
# Запуск поверх основного стека: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up
# Или отдельно: docker compose -f docker-compose.monitoring.yml up
# Prometheus UI: http://localhost:9090
# Grafana UI:    http://localhost:3000  (admin / admin)

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: bookfinder-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: bookfinder-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
